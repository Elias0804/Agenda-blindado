{% extends "base.html" %}

{% block title %}Adicionar Produto - Inventário{% endblock %}
{% block header %}Adicionar Novo Produto{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<style>
  .form-group {
    margin-bottom: 10px;
  }
  label {
    display: block;
    margin-bottom: 3px;
  }
  input, select {
    width: 100%;
    padding: 5px;
    box-sizing: border-box;
  }
  .btn-group {
    margin-top: 15px;
  }
</style>
{% endblock %}

{% block content %}
<section class="inventory-add-form">
  <form method="post">
    <div class="form-group">
      <label for="name">Nome do Produto</label>
      <input type="text" name="name" id="name" placeholder="Digite o nome do produto" required>
    </div>

    <div class="form-group">
      <label for="quantity">Quantidade em Estoque</label>
      <input type="number" name="quantity" id="quantity" placeholder="0" min="0" step="0.01" required>
    </div>

    <div class="form-group">
      <label for="unit_price">Preço Unitário (R$)</label>
      <input type="number" name="unit_price" id="unit_price" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label for="category">Categoria</label>
      <select name="category" id="category">
        <option value="venda">Venda</option>
        <option value="uso">Uso Salão</option>
      </select>
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-add">Adicionar Produto</button>
      <a href="{{ url_for('inventory.inventory') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
