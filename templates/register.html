{% extends "base.html" %}

{% block title %}Cadastro - Agenda{% endblock %}
{% block header %}Criar Conta{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
{% endblock %}

{% block content %}
<div class="register-page">

    <div class="register-card">

        <h2>Criar Conta</h2>
        <p class="subtitle">
            Preencha seus dados para começar.
        </p>

        <!-- Cadastro com Google -->
        <a href="{{ url_for('auth.login_google') }}" class="google-btn">
            <i class="fab fa-google"></i>
            Continuar com Google
        </a>

        <div class="divider">
            <span>ou</span>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Nome Completo"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="E-mail"
                required
            >

            <input
                type="date"
                name="birth_date"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Criar Conta
            </button>

        </form>

        <p class="login-text">
            Já possui conta?
            <a href="{{ url_for('auth.login') }}">
                Entrar
            </a>
        </p>

    </div>

</div>
{% endblock %}
