{% extends "base.html" %}

{% block title %}Login - Agenda{% endblock %}
{% block header %}Entrar{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
{% endblock %}

{% block content %}
<div class="login-page">

    <div class="login-card">

        <h2>Bem-vindo!</h2>
        <p class="subtitle">
            Faça login para acessar sua conta.
        </p>

        <!-- Login com Google -->
        <a href="{{ url_for('auth.login_google') }}" class="google-login-btn">
            <i class="fab fa-google"></i>
            Entrar com Google
        </a>

        <div class="divider">
            <span>ou</span>
        </div>

        <!-- Login tradicional -->
        <form action="{{ url_for('auth.login') }}" method="POST">

            <input
                type="email"
                name="email"
                placeholder="E-mail"
                autocomplete="email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Senha"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <p class="signup-text">
            Ainda não possui uma conta?
            <a href="{{ url_for('auth.register') }}">
                Criar cadastro
            </a>
        </p>

    </div>

</div>
{% endblock %}
